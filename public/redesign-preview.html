document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

55,0.5);text-decoration:none;cursor:pointer;transition:color 0.2s;\" onmouseenter=\"this.style.color='rgba(255,255,255,0.9)'\" onmouseleave=\"this.style.color='rgba(255,255,255,0.5)'\">Contact Us<\u002Fa>\n          <a style=\"font-family:'DM Sans',sans-serif;font-size:11px;color:rgba(255,255,255,0.5);text-decoration:none;cursor:pointer;transition:color 0.2s;\" onmouseenter=\"this.style.color='rgba(255,255,255,0.9)'\" onmouseleave=\"this.style.color='rgba(255,255,255,0.5)'\">Warranty Registration<\u002Fa>\n          <a style=\"font-family:'DM Sans',sans-serif;font-size:11px;color:rgba(255,255,255,0.5);text-decoration:none;cursor:pointer;transition:color 0.2s;\" onmouseenter=\"this.style.color='rgba(255,255,255,0.9)'\" onmouseleave=\"this.style.color='rgba(255,255,255,0.5)'\">Download Catalogue<\u002Fa>\n          <a style=\"font-family:'DM Sans',sans-serif;font-size:11px;color:rgba(255,255,255,0.5);text-decoration:none;cursor:pointer;transition:color 0.2s;\" onmouseenter=\"this.style.color='rgba(255,255,255,0.9)'\" onmouseleave=\"this.style.color='rgba(255,255,255,0.5)'\">Technical FAQ<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <!-- Bottom bar -->\n    <div style=\"border-top:1px solid rgba(255,255,255,0.07);padding:16px 52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;\">\n      <div style=\"font-family:'DM Sans',sans-serif;font-size:10px;color:rgba(255,255,255,0.2);\">© 2025 Sharon Plywoods Pvt. Ltd. All rights reserved.<\u002Fdiv>\n      <div style=\"display:flex;gap:20px;\">\n        <a style=\"font-family:'DM Sans',sans-serif;font-size:10px;color:rgba(255,255,255,0.28);text-decoration:none;cursor:pointer;transition:color 0.2s;\" onmouseenter=\"this.style.color='rgba(255,255,255,0.6)'\" onmouseleave=\"this.style.color='rgba(255,255,255,0.28)'\">Privacy Policy<\u002Fa>\n        <a style=\"font-family:'DM Sans',sans-serif;font-size:10px;color:rgba(255,255,255,0.28);text-decoration:none;cursor:pointer;transition:color 0.2s;\" onmouseenter=\"this.style.color='rgba(255,255,255,0.6)'\" onmouseleave=\"this.style.color='rgba(255,255,255,0.28)'\">Terms of Use<\u002Fa>\n        <a style=\"font-family:'DM Sans',sans-serif;font-size:10px;color:rgba(255,255,255,0.28);text-decoration:none;cursor:pointer;transition:color 0.2s;\" onmouseenter=\"this.style.color='rgba(255,255,255,0.6)'\" onmouseleave=\"this.style.color='rgba(255,255,255,0.28)'\">Sitemap<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"font-family:'DM Sans',sans-serif;font-size:10px;color:rgba(255,255,255,0.2);\">+91 44 3940 3950 · admin@sharonply.com<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { activeSection: 0, activeSlide: 0, activePersona: 0 };\n  animatedSections = new Set();\n  slideInterval = null;\n\n  SLIDE_GRADIENTS = [\n    'linear-gradient(150deg,#6B4A2A 0%,#3D2410 30%,#8B6240 60%,#5C3D22 100%)',\n    'linear-gradient(150deg,#8B7040 0%,#5C4020 25%,#A07845 60%,#6B5030 100%)',\n    'linear-gradient(150deg,#4A3018 0%,#2A1808 30%,#6B4A28 60%,#3D2810 100%)',\n    'linear-gradient(150deg,#2A4A28 0%,#1A3018 25%,#3A5A38 60%,#223020 100%)',\n    'linear-gradient(150deg,#607060 0%,#405040 25%,#809078 60%,#506050 100%)'\n  ];\n\n  componentDidMount() {\n    const scrollEl = document.getElementById('sp-scroll');\n    const sections = document.querySelectorAll('[data-section]');\n    const dotsEl   = document.getElementById('sp-dots');\n    const nav      = document.getElementById('sp-nav');\n\n    // ── Build dots ──\n    sections.forEach((_, i) => {\n      const d = document.createElement('button');\n      d.style.cssText = 'width:4px;height:4px;border-radius:50%;background:rgba(0,0,0,0.18);border:none;cursor:pointer;padding:0;display:block;transition:all 0.4s cubic-bezier(0.16,1,0.3,1)';\n      d.addEventListener('click', () => scrollEl.scrollTo({ top: i * window.innerHeight, behavior: 'smooth' }));\n      dotsEl.appendChild(d);\n    });\n    this.activateDot(0, dotsEl, 0);\n\n    // ── Hero reveal on load ──\n    setTimeout(() => {\n      this.revealSection(sections[0]);\n      this.animatedSections.add(0);\n    }, 400);\n\n    // ── Start hero slideshow ──\n    this.startSlideshow();\n\n    // ── IntersectionObserver ──\n    const observer = new IntersectionObserver((entries) => {\n      entries.forEach(entry => {\n        if (!entry.isIntersecting) return;\n        const idx = parseInt(entry.target.dataset.section, 10);\n        this.setState({ activeSection: idx });\n        this.activateDot(idx, dotsEl, idx);\n        this.adaptNav(idx, nav);\n        if (!this.animatedSections.has(idx)) {\n          this.revealSection(entry.target);\n          this.animatedSections.add(idx);\n        }\n      });\n    }, { threshold: 0.52, root: scrollEl });\n    sections.forEach(s => observer.observe(s));\n\n    // ── Product panel hover ──\n    const panels = Array.from(document.querySelectorAll('[data-panel]'));\n    panels.forEach(panel => {\n      panel.addEventListener('mouseenter', () => panels.forEach(p => { p.style.flex = p === panel ? '1.85' : '0.575'; }));\n      panel.addEventListener('mouseleave', () => panels.forEach(p => { p.style.flex = '1'; }));\n    });\n\n    // ── Tech card hover ──\n    document.querySelectorAll('[data-tech]').forEach(card => {\n      const link = card.querySelector('[data-tech-link]');\n      card.addEventListener('mouseenter', () => { card.style.background = '#EDEAE5'; if (link) link.style.color = '#1A5828'; });\n      card.addEventListener('mouseleave', () => { card.style.background = '#F7F6F3'; if (link) link.style.color = 'rgba(0,0,0,0.28)'; });\n    });\n\n    // ── App card hover ──\n    document.querySelectorAll('[data-app-card]').forEach(card => {\n      const title = card.querySelector('[data-app-title]');\n      const link  = card.querySelector('[data-app-link]');\n      card.addEventListener('mouseenter', () => { card.style.background = '#0F0F0E'; if (title) title.style.color = '#FFFFFF'; if (link) link.style.color = '#F2C22A'; });\n      card.addEventListener('mouseleave', () => { card.style.background = '#FFFFFF'; if (title) title.style.color = '#0F0F0E'; if (link) link.style.color = '#1A5828'; });\n    });\n\n    // ── Persona tab clicks ──\n    document.querySelectorAll('[data-persona-tab]').forEach(tab => {\n      tab.addEventListener('click', () => this.setPersona(parseInt(tab.dataset.personaTab)));\n      tab.addEventListener('mouseenter', () => { if (parseInt(tab.dataset.personaTab) !== this.state.activePersona) tab.style.background = 'rgba(0,0,0,0.025)'; });\n      tab.addEventListener('mouseleave', () => { if (parseInt(tab.dataset.personaTab) !== this.state.activePersona) tab.style.background = 'transparent'; });\n    });\n\n    // ── Side CTA label visibility on hover (show label) ──\n    ['wa-label','call-label','email-label'].forEach(id => {\n      const label = document.getElementById(id);\n      const parent = label && label.parentElement;\n      if (parent && label) {\n        parent.addEventListener('mouseenter', () => { label.style.opacity = '1'; });\n        parent.addEventListener('mouseleave', () => { label.style.opacity = '0'; });\n      }\n    });\n\n    // ── Keyboard nav ──\n    document.addEventListener('keydown', (e) => {\n      const cur   = this.state.activeSection;\n      const total = sections.length;\n      if (e.key === 'ArrowDown' && cur < total - 1) scrollEl.scrollTo({ top: (cur + 1) * window.innerHeight, behavior: 'smooth' });\n      if (e.key === 'ArrowUp'   && cur > 0)         scrollEl.scrollTo({ top: (cur - 1) * window.innerHeight, behavior: 'smooth' });\n    });\n\n    // ── Wheel snap ──\n    let wheeling = false;\n    scrollEl.addEventListener('wheel', (e) => {\n      e.preventDefault();\n      if (wheeling) return;\n      wheeling = true;\n      const next = Math.max(0, Math.min(sections.length - 1, this.state.activeSection + (e.deltaY > 0 ? 1 : -1)));\n      if (next !== this.state.activeSection) scrollEl.scrollTo({ top: next * window.innerHeight, behavior: 'smooth' });\n      setTimeout(() => { wheeling = false; }, 900);\n    }, { passive: false });\n  }\n\n  startSlideshow() {\n    if (this.slideInterval) clearInterval(this.slideInterval);\n    this.slideInterval = setInterval(() => {\n      this.goToSlide((this.state.activeSlide + 1) % 5);\n    }, 4200);\n  }\n\n  goToSlide(idx) {\n    document.querySelectorAll('[data-slide-text]').forEach(el => {\n      const isActive = parseInt(el.dataset.slideText) === idx;\n      el.style.opacity = isActive ? '1' : '0';\n      el.style.pointerEvents = isActive ? 'auto' : 'none';\n    });\n    const img = document.getElementById('hero-img');\n    if (img) img.style.background = this.SLIDE_GRADIENTS[idx];\n    const counter  = document.getElementById('slide-counter');\n    const progress = document.getElementById('slide-progress');\n    if (counter)  counter.textContent = `0${idx + 1} ── 05`;\n    if (progress) progress.style.width = `${((idx + 1) / 5) * 100}%`;\n    this.setState({ activeSlide: idx });\n  }\n\n  setPersona(idx) {\n    document.querySelectorAll('[data-persona-content]').forEach(el => {\n      const isActive = parseInt(el.dataset.personaContent) === idx;\n      el.style.opacity = isActive ? '1' : '0';\n      el.style.pointerEvents = isActive ? 'auto' : 'none';\n    });\n    document.querySelectorAll('[data-persona-tab]').forEach(tab => {\n      const isActive = parseInt(tab.dataset.personaTab) === idx;\n      const name = tab.querySelector('[data-tab-name]');\n      tab.style.borderLeft   = isActive ? '3px solid #1A5828' : '3px solid transparent';\n      tab.style.background   = isActive ? 'rgba(26,88,40,0.03)' : 'transparent';\n      if (name) { name.style.color = isActive ? '#1A5828' : 'rgba(0,0,0,0.45)'; }\n    });\n    this.setState({ activePersona: idx });\n  }\n\n  revealSection(section) {\n    section.querySelectorAll('[data-reveal]').forEach((el, i) => setTimeout(() => el.classList.add('in'), i * 100));\n  }\n\n  activateDot(active, container, sectionIdx) {\n    if (!container) return;\n    const isOnDark  = sectionIdx === 6;\n    const activeCol  = isOnDark ? '#F2C22A' : '#1A5828';\n    const inactiveCol = isOnDark ? 'rgba(255,255,255,0.3)' : 'rgba(0,0,0,0.18)';\n    Array.from(container.children).forEach((d, i) => {\n      if (i === active) { d.style.background = activeCol; d.style.height = '20px'; d.style.width = '4px'; d.style.borderRadius = '2px'; }\n      else              { d.style.background = inactiveCol; d.style.height = '4px'; d.style.width = '4px'; d.style.borderRadius = '50%'; }\n    });\n  }\n\n  adaptNav(idx, nav) {\n    if (!nav) return;\n    const isDark = idx === 6;\n    nav.style.background     = isDark ? 'rgba(15,15,14,0.92)' : 'rgba(255,255,255,0.96)';\n    nav.style.backdropFilter = 'blur(24px)';\n    nav.style.borderBottom   = isDark ? '1px solid rgba(255,255,255,0.08)' : '1px solid rgba(0,0,0,0.07)';\n    const textCol = isDark ? '#FFFFFF' : '#0F0F0E';\n    document.querySelectorAll('[data-nav-link]').forEach(el => { el.style.color = textCol; });\n\n  }\n\n  renderVals() { return {}; }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
