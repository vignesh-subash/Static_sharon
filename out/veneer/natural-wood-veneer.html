h=800\u0026height=600\u0026resize=contain\"],\"badges\":[\"FSC Certified\",\"Natural Sliced\",\"Multi-Species\"],\"usps\":[{\"icon\":\"leaf\",\"label\":\"100% Natural Wood\",\"desc\":\"Authentic sliced timber — not synthetic or reconstituted\"},{\"icon\":\"layers\",\"label\":\"Multi-Species Range\",\"desc\":\"Teak, Walnut, Oak, Maple \u0026 500+ more species\"},{\"icon\":\"surface\",\"label\":\"Multiple Cuts\",\"desc\":\"Crown Cut, Quarter Cut, and Rift Cut available\"},{\"icon\":\"carb\",\"label\":\"Paper Backed\",\"desc\":\"Easy handling and application on any substrate\"},{\"icon\":\"emission\",\"label\":\"FSC Certified\",\"desc\":\"Sustainably sourced from certified forests\"},{\"icon\":\"calibrated\",\"label\":\"Precision Sliced\",\"desc\":\"0.25mm–0.5mm uniform thickness for smooth application\"},{\"icon\":\"certified\",\"label\":\"Custom Cuts\",\"desc\":\"Custom dimensions available on request\"}],\"technology\":[\"Sustainably Sourced\",\"FSC Certified\",\"Uniform Thickness\"],\"features\":[{\"title\":\"100% Natural Wood\",\"description\":\"Every sheet is sliced from real timber logs — not synthetic or reconstituted. The grain, colour variation, and character marks are genuinely natural and unique to each sheet.\",\"icon\":\"leaf\"},{\"title\":\"Wide Species Range\",\"description\":\"Available in Teak, Walnut, Oak, Maple, Cherry, Rosewood, Sapele, Ash, Beech, and other exotic species on request. Match any design aesthetic from classic to contemporary.\",\"icon\":\"layers\"},{\"title\":\"Multiple Cut Options\",\"description\":\"Crown Cut for flowing cathedral grain patterns, Quarter Cut for straight consistent grain, and Rift Cut for an even, linear appearance. Each cut creates a different visual effect.\",\"icon\":\"check\"},{\"title\":\"Paper Backed Option\",\"description\":\"Available in raw (unbacked) form or with paper backing for easier handling, reduced splitting risk, and better adhesion in furniture and panel applications.\",\"icon\":\"surface\"},{\"title\":\"Sustainably Sourced\",\"description\":\"All veneers are sourced from responsibly managed forests. FSC-certified supply chain ensures minimal environmental impact and supports sustainable forestry practices.\",\"icon\":\"leaf\"},{\"title\":\"Consistent Thickness\",\"description\":\"Precision-sliced to uniform 0.25mm–0.5mm thickness for consistent glue-up, even surface, and predictable finishing results across your entire project.\",\"icon\":\"check\"},{\"title\":\"Versatile Applications\",\"description\":\"Used for furniture surfaces, wall panelling, door skins, ceiling panels, headboards, and decorative inlays. The most versatile decorative wood material available.\",\"icon\":\"zap\"},{\"title\":\"Ready for Polish\",\"description\":\"Sanded surface is ready for your choice of finish — lacquer, PU polish, wax, or oil. Achieves furniture-grade results with minimal preparation.\",\"icon\":\"award\"}],\"specifications\":[{\"label\":\"Type\",\"value\":\"Natural Sliced Wood Veneer\"},{\"label\":\"Thickness\",\"value\":\"0.25mm – 0.5mm\"},{\"label\":\"Backing\",\"value\":\"Paper Backed / Raw (Unbacked)\"},{\"label\":\"Species Available\",\"value\":\"Teak, Walnut, Oak, Maple, Cherry, Exotic\"},{\"label\":\"Cut Types\",\"value\":\"Crown Cut, Quarter Cut, Rift Cut\"},{\"label\":\"Sheet Size\",\"value\":\"Varies by species (approx 2400 x 600mm)\"},{\"label\":\"Finish\",\"value\":\"Sanded, Ready for Polish or Lacquer\"},{\"label\":\"Certification\",\"value\":\"FSC Certified Supply Chain\"},{\"label\":\"Custom Cuts\",\"value\":\"Available on Request\"},{\"label\":\"MOQ\",\"value\":\"Available on Request\"}],\"applications\":[{\"name\":\"Furniture Surfaces\"},{\"name\":\"Wall Paneling \u0026 Feature Walls\"},{\"name\":\"Door Skins \u0026 Flush Doors\"},{\"name\":\"Ceiling Panels \u0026 Coffers\"},{\"name\":\"Cabinet Fronts \u0026 Drawer Faces\"},{\"name\":\"Headboards \u0026 Bedside Panels\"},{\"name\":\"Countertops \u0026 Table Tops\"},{\"name\":\"Decorative Accents \u0026 Inlays\"}],\"sizes\":[\"2400 x 600mm\",\"2400 x 900mm\",\"Custom Sizes Available\"],\"thickness\":[\"0.25mm\",\"0.30mm\",\"0.40mm\",\"0.50mm\"],\"firesafe\":false,\"faqs\":[{\"q\":\"What is the difference between Crown Cut and Quarter Cut veneer?\",\"a\":\"Crown Cut (also called flat cut) is sliced through the centre of the log, producing the characteristic arch or 'cathedral' grain pattern. Quarter Cut is sliced at right angles to the growth rings, producing a straighter, more consistent grain pattern.\"},{\"q\":\"Are SharonPly veneers sustainably sourced?\",\"a\":\"Yes. All our veneers come from FSC-certified supply chains, ensuring responsible forest management practices. Veneer also makes highly efficient use of premium timber — one log can yield hundreds of veneer sheets.\"},{\"q\":\"What species are available?\",\"a\":\"Standard availability: Teak, Walnut, Oak, Maple, Cherry. Additional species including Rosewood, Sapele, Ash, Beech, and exotic species available on request for bulk orders.\"},{\"q\":\"Do I need paper-backed veneer or raw?\",\"a\":\"Paper-backed veneer is recommended for most applications — easier to handle, less prone to splitting, and better adhesion with standard contact adhesives. Raw veneer is used by specialist craftsmen for marquetry, inlay work, and curved surfaces.\"},{\"q\":\"What adhesive should I use?\",\"a\":\"Standard contact adhesive (solvent or water-based) works well for most applications. For curved work, use flexible adhesive. PVA woodworking glue with a veneer press or caul boards is ideal for flat panel work.\"}],\"downloadLinks\":[{\"label\":\"Product Brochure (PDF)\",\"href\":\"/catalogue\"},{\"label\":\"Technical Data Sheet\",\"href\":\"/catalogue\"}],\"relatedProducts\":[{\"name\":\"Pre-Polished Veneer\",\"href\":\"/veneer/pre-polished-veneer\",\"image\":\"https://slelguoygbfzlpylpxfs.supabase.co/storage/v1/render/image/public/project-uploads/1d0b54c2-0fa2-4df4-8167-818730c7902a/Plywood-resized-1770810953635.jpg?wid
