with-wooden-console-table-green-plants-floor-lamp-resized-1770809315167.jpg?width=800\u0026height=600\u0026resize=contain\"],\"badges\":[\"MR Grade\",\"IS:2202\",\"10 Year Warranty\"],\"usps\":[{\"icon\":\"droplet\",\"label\":\"MR Grade IS:2202\",\"desc\":\"Moisture resistant bonding for all dry interiors\"},{\"icon\":\"layers\",\"label\":\"Hardwood Frame\",\"desc\":\"Seasoned hardwood perimeter frame construction\"},{\"icon\":\"calibrated\",\"label\":\"Dimensional Stability\",\"desc\":\"Precision-made for exact fit — no adjustment needed\"},{\"icon\":\"termite\",\"label\":\"Termite Resistant\",\"desc\":\"Factory-applied chemical termite treatment\"},{\"icon\":\"carb\",\"label\":\"Smooth Surface\",\"desc\":\"Both sides sanded — paint and laminate ready\"},{\"icon\":\"warranty\",\"label\":\"10-Year Warranty\",\"desc\":\"Structural warranty against delamination\"},{\"icon\":\"certified\",\"label\":\"IS:2202 Certified\",\"desc\":\"Indian Standards certified flush door\"}],\"technology\":[\"MR IS:2202\",\"Termite Treated\",\"Dimensional Stable\"],\"features\":[{\"title\":\"MR Grade (IS:2202)\",\"description\":\"Moisture-resistant bonding compliant with IS:2202 Part 1 standards. Performs reliably in all interior dry environments — living rooms, bedrooms, offices, and corridors.\",\"icon\":\"droplet\"},{\"title\":\"Smooth Face Veneer\",\"description\":\"Both-side hardwood face veneers are sanded to a clean, consistent surface. Ready for painting, lamination, veneering, or other decorative finishes without additional preparation.\",\"icon\":\"surface\"},{\"title\":\"Dimensional Stability\",\"description\":\"Precision-manufactured hardwood frame and balanced construction ensure the door maintains its exact dimensions throughout its life. Fits frames cleanly without adjustment.\",\"icon\":\"layers\"},{\"title\":\"Termite Resistant\",\"description\":\"Factory-applied chemical treatment provides reliable protection against termite and borer attack. Both door faces and exposed
